<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Setup Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D1117; --surface: #161B22; --surface-elevated: #1C2333;
    --border: #30363D; --text: #E6EDF3; --text-muted: #8B949E;
    --accent: #D4A843; --accent-dim: rgba(212,168,67,0.15);
    --teal: #22B8CF; --teal-dim: rgba(34,184,207,0.12);
    --success: #3FB950; --success-dim: rgba(63,185,80,0.12);
    --danger: #F85149; --danger-dim: rgba(248,81,73,0.12);
    --warning: #D29922; --warning-dim: rgba(210,153,34,0.12);
    --purple: #A371F7; --purple-dim: rgba(163,113,247,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
  h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: all 0.25s ease; }
  .card:hover { border-color: rgba(212,168,67,0.3); }
  
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: all 0.2s ease; text-decoration: none; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #0D1117; }
  .btn-primary:hover { background: #E0B84E; }
  .btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(248,81,73,0.3); }
  .btn-danger:hover { background: var(--danger); color: white; }
  .btn-success { background: var(--success-dim); color: var(--success); border: 1px solid rgba(63,185,80,0.3); }
  .btn-success:hover { background: var(--success); color: white; }
  .btn-secondary { background: var(--surface-elevated); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; animation: toastIn 0.35s ease; border: 1px solid; }
  .toast-success { background: var(--success-dim); border-color: rgba(63,185,80,0.3); color: var(--success); }
  .toast-info { background: var(--teal-dim); border-color: rgba(34,184,207,0.3); color: var(--teal); }
  @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; position: relative; }
  .pulse-dot::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; animation: pulse 2s infinite; }
  .pulse-dot.green { background: var(--success); } .pulse-dot.green::after { border: 2px solid var(--success); }
  .pulse-dot.red { background: var(--danger); } .pulse-dot.red::after { border: 2px solid var(--danger); }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0; transform: scale(2); } }

  .bg-glow { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(120px); opacity: 0.04; z-index: 0; }
  .save-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); padding: 4px 10px; border-radius: 6px; background: var(--surface-elevated); border: 1px solid var(--border); }
  .save-indicator.synced { color: var(--success); }
</style>
</head>
<body>

<div class="bg-glow" style="width:600px;height:600px;background:var(--accent);top:-200px;right:-200px;"></div>
<div class="bg-glow" style="width:500px;height:500px;background:var(--teal);bottom:-200px;left:-100px;"></div>
<div id="toastContainer" class="toast-container"></div>

<div style="position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;">
  
  <!-- Header -->
  <header style="padding:20px 28px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="width:40px;height:40px;background:var(--accent-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;">
        <i class="fas fa-server" style="color:var(--accent);font-size:17px;"></i>
      </div>
      <div>
        <h1 style="font-size:20px;font-weight:700;">System Setup Management</h1>
        <p style="font-size:12px;color:var(--text-muted);">Portal & Biometric Integration Queue</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="syncStatus" class="save-indicator synced"><i class="fas fa-check-circle"></i> <span>Synced</span></div>
      <button class="btn btn-secondary" onclick="fetchData()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
  </header>

  <!-- Main Content -->
  <div style="flex:1;overflow-y:auto;padding:28px;display:grid;grid-template-columns:1fr 1fr;gap:24px;">
    
    <!-- Active Setup Column -->
    <div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
        <span class="pulse-dot green"></span>
        <h2 style="font-size:16px;font-weight:700;">Pending Active Setup</h2>
        <span id="activeCount" style="background:var(--success-dim);color:var(--success);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">0</span>
      </div>
      <div id="activeQueue" style="display:flex;flex-direction:column;gap:14px;">
        <div style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-spinner fa-spin" style="font-size:20px;"></i></div>
      </div>
    </div>

    <!-- Inactive Revocation Column -->
    <div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
        <span class="pulse-dot red"></span>
        <h2 style="font-size:16px;font-weight:700;">Pending Inactive Revocation</h2>
        <span id="inactiveCount" style="background:var(--danger-dim);color:var(--danger);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">0</span>
      </div>
      <div id="inactiveQueue" style="display:flex;flex-direction:column;gap:14px;">
        <div style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-spinner fa-spin" style="font-size:20px;"></i></div>
      </div>
    </div>

  </div>
</div>

<script>
  // ==========================================
  // CONFIGURATION
  // ==========================================
  // PASTE YOUR SYSTEM SETUP WEB APP URL HERE
  const API_URL = 'https://script.google.com/macros/s/AKfycbxBIX5mNpekFmaufGs9mrdhyKx3OVqL68nQw_EPDbyGaaBcuwRjq-P9EHjeaj3S9qe3/exec';
  const TOKEN = 'SetupAdmin2024';
  const POLL_INTERVAL = 15000; // Auto-refresh every 15 seconds

  // FORM URL TEMPLATES (Provided by you)
  const SETUP_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSeLkZw2FB5M_ml6izw79B8wId4zupx-0F30MlKA1USXPL_q2Q/viewform?usp=pp_url&entry.1652509489=';
  const REVOKE_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfo0YAKboBErnBh1CADLAtIgyKL4NqjVURDQTbmxBGDUODBvQ/viewform?usp=pp_url&entry.507598123=';

  let storeData = { Active: [], Inactive: [] };

  // ==========================================
  // UTILITY FUNCTIONS
  // ==========================================
  function formatDate(dateStr) { 
    if(!dateStr) return '—'; 
    const d = new Date(dateStr); 
    return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); 
  }
  
  function showToast(msg, type='success') { 
    const c=document.getElementById('toastContainer'); 
    const t=document.createElement('div'); 
    t.className=`toast toast-${type}`; 
    t.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-info-circle'}"></i> ${msg}`; 
    c.appendChild(t); 
    setTimeout(()=>{t.style.animation='toastOut 0.3s ease forwards';setTimeout(()=>t.remove(),300);},3500); 
  }

  // ==========================================
  // DATA FETCHING (API)
  // ==========================================
  async function fetchData() {
    document.getElementById('syncStatus').innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Syncing...</span>';
    document.getElementById('syncStatus').className = 'save-indicator';
    try {
      const res = await fetch(API_URL + '?token=' + TOKEN + '&t=' + Date.now());
      const data = await res.json();
      if (data.Active && data.Inactive) {
        const prevData = JSON.stringify(storeData);
        storeData = data;
        // Only re-render if data actually changed to save resources
        if (JSON.stringify(storeData) !== prevData) renderUI();
      }
    } catch (e) { 
      console.error('Fetch error:', e); 
      showToast('Connection failed. Check console.', 'info');
    }
    document.getElementById('syncStatus').innerHTML = '<i class="fas fa-check-circle"></i> <span>Synced</span>';
    document.getElementById('syncStatus').className = 'save-indicator synced';
  }

  // ==========================================
  // UI RENDERING
  // ==========================================
  function renderUI() {
    const activeEl = document.getElementById('activeQueue');
    const inactiveEl = document.getElementById('inactiveQueue');
    
    document.getElementById('activeCount').textContent = storeData.Active.length;
    document.getElementById('inactiveCount').textContent = storeData.Inactive.length;

    if (!storeData.Active.length) {
      activeEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-check-double" style="font-size:24px;display:block;margin-bottom:10px;color:var(--success);"></i>All active setups completed</div>';
    } else {
      activeEl.innerHTML = storeData.Active.map(emp => createCard(emp, 'active')).join('');
    }

    if (!storeData.Inactive.length) {
      inactiveEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);"><i class="fas fa-shield-halved" style="font-size:24px;display:block;margin-bottom:10px;color:var(--danger);"></i>No pending revocations</div>';
    } else {
      inactiveEl.innerHTML = storeData.Inactive.map(emp => createCard(emp, 'inactive')).join('');
    }
  }

  function createCard(emp, type) {
    const isInactive = type === 'inactive';
    const borderColor = isInactive ? 'var(--danger)' : 'var(--teal)';
    const borderStyle = `border-left: 4px solid ${borderColor};`;
    const btnClass = isInactive ? 'btn-danger' : 'btn-success';
    const btnIcon = isInactive ? 'fa-user-slash' : 'fa-user-check';
    const btnText = isInactive ? 'Revoke Credentials' : 'Complete Setup';
    
    // GENERATE PREFILLED LINK ON THE FLY based on Employee ID
    const empId = emp['Employee ID'] || '';
    const formBaseUrl = isInactive ? REVOKE_FORM_URL : SETUP_FORM_URL;
    const formLink = formBaseUrl + encodeURIComponent(empId);

    return `
      <div class="card" style="${borderStyle}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
          <div>
            <h3 style="font-size:15px;font-weight:700;">${emp['Employee Name']}</h3>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${emp['Designation']}</div>
          </div>
          <code style="background:var(--bg);padding:3px 8px;border-radius:4px;font-size:11px;">${empId}</code>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;color:var(--text-muted);margin-bottom:14px;">
          <div><i class="fas fa-building" style="margin-right:4px;color:var(--accent);"></i>${emp['Business Unit']}</div>
          <div><i class="fas fa-calendar" style="margin-right:4px;"></i>DOJ: ${formatDate(emp['Date of Joining'])}</div>
          <div><i class="fas fa-briefcase" style="margin-right:4px;"></i>${emp['Joining Type']}</div>
        </div>
        <a href="${formLink}" target="_blank" class="btn ${btnClass}" style="width:100%;justify-content:center;text-decoration:none;">
          <i class="fas ${btnIcon}"></i> ${btnText}
        </a>
      </div>
    `;
  }

  // ==========================================
  // INITIALIZATION & POLLING
  // ==========================================
  fetchData();
  setInterval(fetchData, POLL_INTERVAL);
</script>
</body>
</html>
